name: Terraform Staging

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the Terraform plan"
        required: true
        type: boolean
        default: false
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-staging.yml"
  push:
    branches:
      - feat/add-staging
    paths:
      - "infra/**"
      - ".github/workflows/terraform-staging.yml"

concurrency:
  group: terraform-staging
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: staging

    defaults:
      run:
        working-directory: infra/envs/staging

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/social/terraform.tfstate" \
            -backend-config="region=ap-southeast-1"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="key_name=${{ secrets.EC2_KEY_NAME }}" \
            -var='ssh_cidr_blocks=["${{ secrets.SSH_CIDR }}"]' \
            -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.apply == true
        run: terraform apply -auto-approve tfplan

      - name: Terraform output
        if: github.event_name == 'push' || inputs.apply == true
        run: terraform output
