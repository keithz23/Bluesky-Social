services:
  # --- FRONTEND SERVICE ---
  social-fe:
    container_name: social-fe
    image: keith0309/social-fe:${GITHUB_SHA}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - NEXT_PUBLIC_CALLBACK_URL=${NEXT_PUBLIC_CALLBACK_URL}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # --- BACKEND SERVICE ---
  app:
    container_name: social-app
    image: keith0309/social-be:${GITHUB_SHA}
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8000/api/v1/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  # --- DATABASE ---
  db:
    image: postgres:15
    container_name: social-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # --- REDIS ---
  redis:
    image: redis:latest
    container_name: social-redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis-db:/data

  nginx:
    image: nginx:alpine
    container_name: social-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    restart: always
    depends_on:
      - social-fe
      - app

volumes:
  postgres-data:
  redis-db:
