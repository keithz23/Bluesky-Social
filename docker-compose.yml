services:
  # --- FRONTEND SERVICE ---
  social-fe:
    container_name: social-fe
    image: keith0309/social-fe:latest 
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    restart: always

  # --- BACKEND SERVICE ---
  app:
    container_name: social-app
    image: keith0309/social-be:latest
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    restart: always

  # --- DATABASE ---
  db:
    image: postgres:15
    container_name: social-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # --- REDIS ---
  redis:
    image: redis:latest
    container_name: social-redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis-db:/data

  nginx:
    image: nginx:alpine
    container_name: social-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    restart: always

volumes:
  postgres-data:
  redis-db: